<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1200"/>
<title>OG card — Why we built Kronroe</title>
<style>
  /*
   * Per-post OG card for /blog/why-kronroe/.
   *
   * Renders at 1200×630 (Open Graph standard, also LinkedIn-recommended).
   *
   * To produce the PNG:
   *   1. Run the static preview server on site/ (port 5178 by convention)
   *   2. Open /og-images/post-why-kronroe.html in a 1200×630 viewport
   *   3. Screenshot, save to site/blog/why-kronroe/og-image.png
   *
   * The page's <meta property="og:image"> already points at that path,
   * so once the PNG is in place the LinkedIn preview is correct.
   *
   * Future posts: copy this file, swap the title/subtitle/date, render.
   * When there are 4+ posts, automate via a build script (defer until then).
   */

  @font-face {
    font-family: 'Plus Jakarta Sans';
    src: url('/fonts/web/plusjakartasans-var-latin.woff2') format('woff2');
    font-weight: 400 800;
    font-style: normal;
    font-display: block; /* block: don't render until font is ready */
  }
  @font-face {
    font-family: 'JetBrains Mono';
    src: url('/fonts/web/jetbrainsmono-var-latin.woff2') format('woff2');
    font-weight: 400 700;
    font-style: normal;
    font-display: block;
  }
  @font-face {
    font-family: 'Virgil';
    src: url('/fonts/web/virgil.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: block;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }

  body {
    background: #FBFAFF;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    color: #191726;
    position: relative;
    padding: 80px 88px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* ─── Stripes top + bottom ──────────────────────────── */

  .stripe {
    position: absolute;
    left: 0;
    right: 0;
    height: 8px;
    display: flex;
  }
  .stripe.top    { top: 0; }
  .stripe.bottom { bottom: 0; }
  .stripe span { flex: 1; }
  .stripe span:nth-child(1) { background: #7C5CFC; }
  .stripe span:nth-child(2) { background: #E87D4A; }
  .stripe span:nth-child(3) { background: #3EC9C9; }
  .stripe span:nth-child(4) { background: #8BBF20; }

  /* ─── Eyebrow row (category + date) ─────────────────── */

  .eyebrow {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #6E6980;
    margin-bottom: 36px;
    display: flex;
    gap: 28px;
    align-items: center;
  }
  .eyebrow .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #C4BFD1;
  }

  /* ─── Title (the dominant element) ──────────────────── */

  .title {
    font-size: 96px;
    font-weight: 800;
    line-height: 1.02;
    letter-spacing: -0.03em;
    color: #0E0C1B;
    margin-bottom: 36px;
    /* Cap at 4 lines so absurdly long titles stay inside the card. */
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ─── Subtitle / lede excerpt ───────────────────────── */

  .subtitle {
    font-size: 30px;
    line-height: 1.4;
    color: #4A4559;
    max-width: 920px;
    font-weight: 400;
  }
  .subtitle em {
    font-style: italic;
    color: #191726;
  }

  /* ─── Annotation in handwritten font ────────────────── */

  .annotation {
    font-family: 'Virgil', 'Caveat', cursive;
    font-size: 26px;
    color: #E87D4A;
    margin-top: 20px;
  }

  /* ─── Bottom row (brand + author) ───────────────────── */

  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .brand-mark {
    width: 56px;
    height: 56px;
  }
  .brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .wordmark {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .wordmark .roe { color: #7C5CFC; }
  .url {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 14px;
    color: #6E6980;
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  .author-block {
    text-align: right;
    line-height: 1.3;
  }
  .author-by {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 14px;
    color: #6E6980;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .author-name {
    font-size: 22px;
    font-weight: 700;
    color: #191726;
    margin-top: 6px;
  }

  /* ─── Faint background dots (decorative) ────────────── */

  .bg-dot {
    position: absolute;
    border-radius: 50%;
    opacity: 0.07;
  }
</style>
</head>
<body>

<div class="stripe top">
  <span></span><span></span><span></span><span></span>
</div>

<!-- Faint corner accents for visual texture -->
<div class="bg-dot" style="background:#7C5CFC;width:240px;height:240px;top:-60px;right:-80px;"></div>
<div class="bg-dot" style="background:#E87D4A;width:160px;height:160px;bottom:30px;right:160px;"></div>
<div class="bg-dot" style="background:#3EC9C9;width:120px;height:120px;top:200px;left:-40px;"></div>

<div>
  <div class="eyebrow">
    <span>Thinking</span>
    <span class="dot"></span>
    <span>April 2026</span>
  </div>

  <h1 class="title">Why we built Kronroe</h1>

  <p class="subtitle">
    AI agents need memory that understands <em>time</em>.
    Not a key-value store bolted to a vector database — a
    purpose-built engine where every fact carries four timestamps.
  </p>

  <div class="annotation">&#8627; build notes from Rebekah Cole</div>
</div>

<div class="footer-row">
  <div class="brand">
    <svg class="brand-mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <circle cx="25" cy="25" r="14" fill="#3EC9C9"/>
      <line x1="40" y1="25" x2="60" y2="25" stroke="#3EC9C9" stroke-width="3" stroke-linecap="round"/>
      <circle cx="75" cy="25" r="12" fill="none" stroke="#8BBF20" stroke-width="3"/>
      <circle cx="75" cy="25" r="4.5" fill="#8BBF20"/>
      <circle cx="25" cy="75" r="14" fill="#E87D4A"/>
      <line x1="40" y1="75" x2="60" y2="75" stroke="#E87D4A" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="8 4"/>
      <circle cx="75" cy="75" r="12" fill="none" stroke="#7C5CFC" stroke-width="3"/>
      <circle cx="75" cy="75" r="4.5" fill="#7C5CFC"/>
    </svg>
    <div class="brand-text">
      <div class="wordmark"><span>Kron</span><span class="roe">roe</span></div>
      <div class="url">kronroe.dev/blog</div>
    </div>
  </div>
</div>

<div class="stripe bottom">
  <span></span><span></span><span></span><span></span>
</div>

</body>
</html>
