<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script>/* Redirect Firebase default hostnames to canonical kronroe.dev — runs synchronously before render to avoid flashing wrong-domain content */
(function(){var h=location.hostname;if(h==='kronroe.web.app'||h==='kronroe.firebaseapp.com'){location.replace('https://kronroe.dev'+location.pathname+location.search+location.hash);}})();</script>
<title>404 — Lost in time | Kronroe</title>
<meta name="description" content="That page doesn't exist at this point in time."/>
<meta name="robots" content="noindex"/>
<meta property="og:title" content="404 — Lost in time | Kronroe"/>
<meta property="og:type" content="website"/>
<meta property="og:url" content="https://kronroe.dev/404"/>
<link rel="canonical" href="https://kronroe.dev/"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<script defer src="/js/analytics-consent.js"></script>
<style>
  @font-face {
    font-family: 'Plus Jakarta Sans';
    src: url('/fonts/web/plusjakartasans-var-latin.woff2') format('woff2');
    font-weight: 400 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'JetBrains Mono';
    src: url('/fonts/web/jetbrainsmono-var-latin.woff2') format('woff2');
    font-weight: 400 700;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg: #FBFAFF;
    --warm-10: #191726;
    --warm-7: #4A4559;
    --warm-5: #6E6980;
    --violet-6: #7C5CFC;
    --violet-7: #6344E0;
    --copper-6: #E87D4A;
    --cyan-6: #3EC9C9;
    --lime-6: #8BBF20;
    --border: #DDD9E8;
    --surface: #F4F2FA;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--warm-10);
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    text-align: center;
  }

  .stripe {
    height: 4px;
    width: 100%;
    max-width: 480px;
    background: linear-gradient(90deg,
      var(--violet-6) 0 25%,
      var(--copper-6) 25% 50%,
      var(--cyan-6) 50% 75%,
      var(--lime-6) 75% 100%);
    border-radius: 2px;
    margin-bottom: 2.5rem;
  }

  .four-oh-four {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.85rem;
    color: var(--warm-5);
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(2.25rem, 6vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 1rem;
  }

  .lede {
    font-size: 1.05rem;
    color: var(--warm-7);
    max-width: 480px;
    margin: 0 auto 2.5rem;
  }

  .lede em {
    font-style: italic;
    color: var(--warm-10);
  }

  .actions {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 3rem;
  }

  .btn {
    display: inline-block;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    text-decoration: none;
    border: 1.5px solid transparent;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .btn-primary {
    background: var(--violet-6);
    color: #fff;
    border-color: var(--violet-6);
  }
  .btn-primary:hover { background: var(--violet-7); border-color: var(--violet-7); }

  .btn-secondary {
    background: transparent;
    color: var(--warm-7);
    border-color: #C4BFD1;
  }
  .btn-secondary:hover {
    background: var(--surface);
    color: var(--warm-10);
  }

  .timestamps {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.78rem;
    color: var(--warm-5);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    max-width: 480px;
    margin: 0 auto;
    text-align: left;
    line-height: 1.7;
  }
  .timestamps .ts-label { color: var(--warm-7); font-weight: 600; }
  .timestamps .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 0.5rem;
    vertical-align: middle;
  }
  .ts-cyan .dot { background: var(--cyan-6); }
  .ts-lime .dot { background: var(--lime-6); }

  footer {
    margin-top: 3rem;
    font-size: 0.78rem;
    color: var(--warm-5);
  }
  footer a {
    color: var(--violet-6);
    text-decoration: none;
  }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="stripe" aria-hidden="true"></div>

<p class="four-oh-four">404 — page not found</p>

<h1>Lost in time.</h1>

<p class="lede">
  That page doesn't exist at this point in time. Either it never <em>was</em> &mdash;
  or it <em>was</em>, and we've since invalidated it.
</p>

<div class="actions">
  <a class="btn btn-primary" href="/">Back to homepage</a>
  <a class="btn btn-secondary" href="/blog/">Read the blog</a>
  <a class="btn btn-secondary" href="/docs/">Browse the docs</a>
</div>

<div class="timestamps">
  <span class="ts-label ts-cyan"><span class="dot"></span>valid_from:</span> never<br>
  <span class="ts-label ts-lime"><span class="dot"></span>valid_to:</span> never
</div>

<footer>
  <p>
    &copy; 2026 Rebekah Cole &middot;
    <a href="/">Home</a> &middot;
    <a href="/blog/">Blog</a> &middot;
    <a href="/docs/">Docs</a> &middot;
    <a href="/about/">About</a> &middot;
    <a href="/privacy/">Privacy</a> &middot;
    <a href="https://github.com/kronroe/kronroe">GitHub</a>
  </p>
</footer>

</body>
</html>
