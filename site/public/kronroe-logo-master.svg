<?xml version="1.0" encoding="UTF-8"?>
<!--
  Kronroe Logo — Master (light/cream backgrounds) — v2 DESIGN SYSTEM ALIGNED

  Mark:      Two rails · four nodes · hollow rings for "to" timestamps
  Wordmark:  Kron (warm-10 #191726) + roe (violet-6 #7C5CFC) · no space · TWO SEPARATE <text> elements

  v2 CHANGES (design system alignment):
  - Font: Inter → Plus Jakarta Sans (matches design system voice-1)
  - "Kron" colour: #1A1612 → #191726 (warm-10, violet-tinted neutral)
  - Weight: 600 → 700 (matches design system heading weight)

  TECHNICAL NOTES:
  - NO opacity attributes anywhere — opacity breaks when SVG loaded via <img> tag
  - TWO separate <text> elements NOT <tspan>
  - Colour meaning:
    ● Aqua   #3EC9C9  valid_from
    ○ Lime   #8BBF20  valid_to     (hollow ring)
    ● Copper #E87D4A  recorded_from
    ○ Violet #7C5CFC  recorded_to  (hollow ring)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">

  <!-- Valid timeline (solid rail) -->
  <circle cx="40" cy="30" r="14" fill="#3EC9C9"/>
  <line x1="55" y1="30" x2="97" y2="30" stroke="#3EC9C9" stroke-width="3" stroke-linecap="round"/>
  <circle cx="112" cy="30" r="12" fill="none" stroke="#8BBF20" stroke-width="3"/>
  <circle cx="112" cy="30" r="4.5" fill="#8BBF20"/>

  <!-- Recorded timeline (dashed rail) -->
  <circle cx="40" cy="70" r="14" fill="#E87D4A"/>
  <line x1="55" y1="70" x2="97" y2="70" stroke="#E87D4A" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="8 4"/>
  <circle cx="112" cy="70" r="12" fill="none" stroke="#7C5CFC" stroke-width="3"/>
  <circle cx="112" cy="70" r="4.5" fill="#7C5CFC"/>

  <!-- Wordmark: TWO separate <text> elements — NOT tspan -->
  <text x="138" y="65"
    font-family="'Plus Jakarta Sans','Inter','Helvetica Neue',Arial,sans-serif"
    font-size="42" font-weight="700" letter-spacing="-0.8"
    fill="#191726">Kron</text>
  <text x="230" y="65"
    font-family="'Plus Jakarta Sans','Inter','Helvetica Neue',Arial,sans-serif"
    font-size="42" font-weight="700" letter-spacing="-0.8"
    fill="#7C5CFC">roe</text>

</svg>
