<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>Kronroe Favicon</title>
  <rect width="32" height="32" rx="6" fill="#2A1D12"/>
  <!-- Valid timeline (solid rail) -->
  <circle cx="8" cy="11" r="4" fill="#3EC9C9"/>
  <line x1="12.5" y1="11" x2="19.5" y2="11" stroke="#3EC9C9" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="24" cy="11" r="3.5" fill="none" stroke="#8BBF20" stroke-width="1.8"/>
  <circle cx="24" cy="11" r="1.3" fill="#8BBF20"/>
  <!-- Recorded timeline (dashed rail) -->
  <circle cx="8" cy="22" r="4" fill="#E87D4A"/>
  <line x1="12.5" y1="22" x2="19.5" y2="22" stroke="#E87D4A" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="3 2"/>
  <circle cx="24" cy="22" r="3.5" fill="none" stroke="#7C5CFC" stroke-width="1.8"/>
  <circle cx="24" cy="22" r="1.3" fill="#7C5CFC"/>
</svg>
