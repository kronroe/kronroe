<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script>/* Redirect Firebase default hostnames to canonical kronroe.dev — runs synchronously before render to avoid flashing wrong-domain content */
(function(){var h=location.hostname;if(h==='kronroe.web.app'||h==='kronroe.firebaseapp.com'){location.replace('https://kronroe.dev'+location.pathname+location.search+location.hash);}})();</script>
<title>Almost there — check your inbox | Kronroe</title>
<meta name="description" content="We just sent you a confirmation email. Click the link inside to finish subscribing."/>
<meta name="robots" content="noindex"/>
<link rel="canonical" href="https://kronroe.dev/"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<script defer src="/js/analytics-consent.js"></script>
<style>
  @font-face {
    font-family: 'Plus Jakarta Sans';
    src: url('/fonts/web/plusjakartasans-var-latin.woff2') format('woff2');
    font-weight: 400 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'JetBrains Mono';
    src: url('/fonts/web/jetbrainsmono-var-latin.woff2') format('woff2');
    font-weight: 400 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Virgil';
    src: url('/fonts/web/virgil.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg: #FBFAFF;
    --warm-10: #191726;
    --warm-7: #4A4559;
    --warm-5: #6E6980;
    --violet-6: #7C5CFC;
    --violet-7: #6344E0;
    --copper-6: #E87D4A;
    --cyan-6: #3EC9C9;
    --lime-6: #8BBF20;
    --border: #DDD9E8;
    --surface: #F4F2FA;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--warm-10);
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    text-align: center;
  }

  .stripe {
    height: 4px;
    width: 100%;
    max-width: 480px;
    background: linear-gradient(90deg,
      var(--violet-6) 0 25%,
      var(--copper-6) 25% 50%,
      var(--cyan-6) 50% 75%,
      var(--lime-6) 75% 100%);
    border-radius: 2px;
    margin-bottom: 2.5rem;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 0.85rem;
    color: var(--warm-5);
    letter-spacing: 0.06em;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 1.25rem;
  }

  .lede {
    font-size: 1.05rem;
    color: var(--warm-7);
    max-width: 480px;
    margin: 0 auto 1.5rem;
  }

  .annotation {
    font-family: 'Virgil', 'Caveat', cursive;
    font-size: 1.05rem;
    color: var(--violet-6);
    margin: 0 auto 2.5rem;
  }

  .actions {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    display: inline-block;
    padding: 0.7rem 1.4rem;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    text-decoration: none;
    border: 1.5px solid transparent;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .btn-secondary {
    background: transparent;
    color: var(--warm-7);
    border-color: #C4BFD1;
  }
  .btn-secondary:hover {
    background: var(--surface);
    color: var(--warm-10);
  }

  footer {
    margin-top: 3rem;
    font-size: 0.78rem;
    color: var(--warm-5);
  }
  footer a {
    color: var(--violet-6);
    text-decoration: none;
  }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="stripe" aria-hidden="true"></div>

<p class="eyebrow">subscribe — pending confirmation</p>

<h1>Almost there.</h1>

<p class="lede">
  We just sent a confirmation email to your inbox. Click the link
  inside to finish subscribing — should arrive within a minute or two.
</p>

<p class="annotation">&#8627; if it doesn't show up, check spam</p>

<div class="actions">
  <a class="btn btn-secondary" href="/blog/">Read the blog while you wait</a>
  <a class="btn btn-secondary" href="/">Back to homepage</a>
</div>

<footer>
  <p>&copy; 2026 Kronroe &middot; <a href="https://github.com/kronroe/kronroe">GitHub</a></p>
</footer>

</body>
</html>
