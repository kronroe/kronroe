<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 25 180 105">
  <title>Kronroe Logo — Fully Connected Triangle</title>
  <desc>Three nodes with all three edges visible, each in the colour of its source node. Most complete graph representation.</desc>
  <line x1="44" y1="100" x2="156" y2="100" stroke="#5A8A00" stroke-width="4" stroke-linecap="round" opacity="0.25"/>
  <line x1="44" y1="100" x2="100" y2="50" stroke="#7C5CFC" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <line x1="156" y1="100" x2="100" y2="50" stroke="#C04800" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
  <circle cx="44" cy="100" r="18" fill="#7C5CFC"/>
  <circle cx="156" cy="100" r="18" fill="#5A8A00"/>
  <circle cx="100" cy="48" r="14" fill="#C04800"/>
</svg>
