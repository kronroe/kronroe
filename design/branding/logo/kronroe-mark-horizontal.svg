<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 30 200 70">
  <title>Kronroe Logo — Horizontal (inline)</title>
  <desc>Three nodes in a horizontal line: subject → predicate → value. For wide/inline contexts.</desc>
  <line x1="40" y1="65" x2="110" y2="65" stroke="#7C5CFC" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <line x1="110" y1="65" x2="180" y2="65" stroke="#C04800" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <circle cx="40" cy="65" r="18" fill="#7C5CFC"/>
  <circle cx="110" cy="65" r="15" fill="#C04800"/>
  <circle cx="180" cy="65" r="18" fill="#5A8A00"/>
</svg>
