name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "crates/wasm/**"
      - "crates/core/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Build & Deploy to Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM package
        run: wasm-pack build crates/wasm --target web --out-dir ../../site/public/pkg --no-typescript
        # outputs into site/public/pkg/ — assembled into dist in the next step

      - name: Assemble static site into dist
        run: |
          set -euo pipefail
          rm -rf site/dist
          mkdir -p site/dist
          cp site/index.html site/dist/
          cp site/og-image.png site/dist/
          cp -r site/public/* site/dist/
          echo "Assembled site/dist/:"
          ls -la site/dist/

      - name: Smoke test — verify index.html exists
        run: |
          set -euo pipefail
          test -f site/dist/index.html || { echo "ERROR: index.html missing from dist"; exit 1; }
          grep -q "Kronroe" site/dist/index.html || { echo "ERROR: index.html missing Kronroe content"; exit 1; }
          echo "Smoke test passed"

      - name: Deploy to Firebase Hosting
        id: deploy
        uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KRONROE }}
          channelId: live
          projectId: kronroe

      - name: Run post-deploy smoke test
        env:
          PLAYGROUND_URL: ${{ steps.deploy.outputs.details_url }}
        run: |
          set -euo pipefail
          URL="${PLAYGROUND_URL:-https://kronroe.web.app}"
          echo "Smoke testing ${URL}"
          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" "${URL}")
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "ERROR: ${URL} returned HTTP ${HTTP_CODE}" >&2
            exit 1
          fi
          curl -s "${URL}" | grep -q "Kronroe" || { echo "ERROR: page missing Kronroe content" >&2; exit 1; }
          echo "Smoke test passed — HTTP ${HTTP_CODE}"
          {
            echo "## Post-Deploy Smoke Test"
            echo ""
            echo "- URL: ${URL}"
            echo "- Status: HTTP ${HTTP_CODE}"
            echo "- Content check: passed"
          } >> "$GITHUB_STEP_SUMMARY"
