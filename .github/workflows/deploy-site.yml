name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "crates/wasm/**"
      - "crates/core/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    name: Build & Deploy to Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM package
        run: wasm-pack build crates/wasm --target web --out-dir ../../site/public/pkg --no-typescript
        # outputs into site/public/pkg/ — assembled into dist in the next step

      - name: Set up Python deps for docs + sitemap
        run: |
          python3 -m venv site/scripts/.venv
          site/scripts/.venv/bin/pip install --quiet \
            markdown-it-py mdit-py-plugins pygments

      - name: Regenerate sitemap from blog posts
        run: python3 site/scripts/build-sitemap.py

      - name: Build docs from markdown
        # Renders site/docs/**/*.md → site/docs-built/<...>/index.html
        # using the Kronroe design system (see site/scripts/build-docs.py).
        run: site/scripts/.venv/bin/python site/scripts/build-docs.py

      - name: Assemble static site into dist
        run: |
          set -euo pipefail
          rm -rf site/dist
          mkdir -p site/dist
          cp site/index.html site/dist/
          cp site/404.html site/dist/
          cp site/og-image.png site/dist/
          cp -r site/public/* site/dist/
          # Copy hand-authored docs landing page; rendered subpages
          # come from site/docs-built/ in the next step. Only copy the
          # landing index.html (and any other top-level static files),
          # not the source markdown/directories.
          mkdir -p site/dist/docs
          cp site/docs/index.html site/dist/docs/index.html
          # Overlay the rendered docs pages + assets from build-docs.py
          if [ -d site/docs-built ]; then
            cp -r site/docs-built/. site/dist/docs/
          fi
          # Copy blog pages
          if [ -d site/blog ]; then
            cp -r site/blog site/dist/blog
          fi
          # Copy newsletter landing pages (subscribe / confirmed)
          if [ -d site/newsletter ]; then
            cp -r site/newsletter site/dist/newsletter
          fi
          # Copy info pages (about / privacy / pricing)
          if [ -d site/about ]; then
            cp -r site/about site/dist/about
          fi
          if [ -d site/privacy ]; then
            cp -r site/privacy site/dist/privacy
          fi
          if [ -d site/pricing ]; then
            cp -r site/pricing site/dist/pricing
          fi
          # Copy shared JS modules (consent banner, email capture, etc.)
          if [ -d site/js ]; then
            cp -r site/js site/dist/js
          fi
          echo "Assembled site/dist/:"
          ls -la site/dist/

      - name: Smoke test — verify index.html exists
        run: |
          set -euo pipefail
          test -f site/dist/index.html || { echo "ERROR: index.html missing from dist"; exit 1; }
          grep -q "Kronroe" site/dist/index.html || { echo "ERROR: index.html missing Kronroe content"; exit 1; }
          echo "Smoke test passed"

      - name: Verify all referenced static assets exist in dist
        # Prevents the classic "ship a page that references /js/foo.js but
        # forget to copy site/js/ into site/dist/" bug. Greps every HTML
        # file in dist for src/href attributes and confirms the referenced
        # local files exist on disk. Skips external URLs and data: URIs.
        run: |
          set -euo pipefail
          missing=0
          while IFS= read -r html; do
            # Pull every local src/href from <script>, <link>, <img> tags
            while IFS= read -r ref; do
              # Skip empty, external, or data: refs
              case "$ref" in
                ""|http*|//*|data:*|mailto:*|tel:*|\#*) continue ;;
              esac
              # Strip query string and fragment for filesystem lookup
              path="${ref%%\?*}"
              path="${path%%#*}"
              # Normalise: leading "/" → relative to dist root
              case "$path" in
                /*) full="site/dist${path}" ;;
                *)  full="$(dirname "$html")/${path}" ;;
              esac
              # Directory references (e.g. href="/blog/") map to index.html
              if [ -d "$full" ]; then
                full="${full%/}/index.html"
              fi
              if [ ! -f "$full" ]; then
                echo "MISSING: $html references $ref → $full not found"
                missing=$((missing+1))
              fi
            done < <(grep -oE '(src|href)="[^"]+"' "$html" | sed -E 's/^(src|href)="([^"]+)"$/\2/')
          done < <(find site/dist -name '*.html' -type f)
          if [ "$missing" -gt 0 ]; then
            echo "ERROR: $missing referenced asset(s) missing from dist" >&2
            exit 1
          fi
          echo "All referenced static assets present in dist"

      - name: Deploy to Firebase Hosting
        id: deploy
        uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KRONROE }}
          channelId: live
          projectId: kronroe

      - name: Run post-deploy smoke test
        env:
          PLAYGROUND_URL: ${{ steps.deploy.outputs.details_url }}
        run: |
          set -euo pipefail

          # Test the canonical kronroe.dev (what users actually see) instead
          # of kronroe.web.app — the Firebase default hostname now redirects
          # to kronroe.dev anyway, but checking the canonical also catches
          # DNS/CDN issues that a bare-Firebase check would miss.
          URL="${PLAYGROUND_URL:-https://kronroe.dev}"
          echo "Smoke testing ${URL}"

          # Save body to a temp file rather than piping to grep. With
          # `set -o pipefail`, `curl ... | grep -q` was failing with exit 141
          # (SIGPIPE): grep finds the match early and exits, then curl gets
          # SIGPIPE on its still-open write, and pipefail propagates that
          # 141 as the pipeline result. Writing to a file avoids the pipe
          # entirely.
          BODY_FILE="$(mktemp)"
          trap 'rm -f "${BODY_FILE}"' EXIT

          # Retry loop — Firebase CDN edge nodes may take a few seconds to propagate
          MAX_RETRIES=4
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE="$(curl -sL --compressed -o "${BODY_FILE}" -w '%{http_code}' "${URL}")"

            if [ "${HTTP_CODE}" != "200" ]; then
              echo "Attempt ${i}/${MAX_RETRIES}: HTTP ${HTTP_CODE} — retrying in 5s..."
              sleep 5
              continue
            fi

            if grep -q "Kronroe" "${BODY_FILE}"; then
              echo "Smoke test passed on attempt ${i} — HTTP ${HTTP_CODE}"
              {
                echo "## Post-Deploy Smoke Test"
                echo ""
                echo "- URL: ${URL}"
                echo "- Status: HTTP ${HTTP_CODE}"
                echo "- Content check: passed (attempt ${i})"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            echo "Attempt ${i}/${MAX_RETRIES}: HTTP 200 but content not yet propagated — retrying in 5s..."
            sleep 5
          done

          echo "ERROR: smoke test failed after ${MAX_RETRIES} attempts" >&2
          echo "Last HTTP code: ${HTTP_CODE}" >&2
          echo "First 500 bytes of last response body:" >&2
          head -c 500 "${BODY_FILE}" >&2
          echo "" >&2
          exit 1
