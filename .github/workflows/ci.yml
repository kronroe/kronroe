name: CI

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/core/**"
      - "crates/agent-memory/**"
      - "crates/ios/**"
      - "crates/android/**"
      - "crates/mcp-server/**"
      - "crates/python/**"
      - "crates/wasm/**"
      - "packages/kronroe-mcp/**"
      - "python/kronroe-mcp/**"
      - "scripts/wrapper_smoke.py"
      - "scripts/hybrid_stage3_gate.py"
      - "site/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/core/**"
      - "crates/agent-memory/**"
      - "crates/ios/**"
      - "crates/android/**"
      - "crates/mcp-server/**"
      - "crates/python/**"
      - "crates/wasm/**"
      - "packages/kronroe-mcp/**"
      - "python/kronroe-mcp/**"
      - "scripts/wrapper_smoke.py"
      - "scripts/hybrid_stage3_gate.py"
      - "site/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      wasm: ${{ steps.filter.outputs.wasm }}
      site: ${{ steps.filter.outputs.site }}
      wrappers: ${{ steps.filter.outputs.wrappers }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect paths
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/core/**'
              - 'crates/agent-memory/**'
              - 'crates/ios/**'
              - 'crates/android/**'
              - 'crates/mcp-server/**'
              - 'crates/python/**'
              - 'crates/wasm/**'
            wasm:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/core/**'
              - 'crates/agent-memory/**'
              - 'crates/wasm/**'
            wrappers:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/core/**'
              - 'crates/agent-memory/**'
              - 'crates/mcp-server/**'
              - 'packages/kronroe-mcp/**'
              - 'python/kronroe-mcp/**'
              - 'scripts/wrapper_smoke.py'
              - 'scripts/hybrid_stage3_gate.py'
              - '.github/workflows/ci.yml'
            site:
              - 'crates/core/**'
              - 'crates/agent-memory/**'
              - 'crates/wasm/**'
              - 'site/**'
              - 'firebase.json'
              - '.firebaserc'

  # ─── Tests ────────────────────────────────────────────────────────────────

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2

      - name: Run tests
        run: cargo test --all --all-features

  # ─── Clippy ───────────────────────────────────────────────────────────────

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + clippy
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2

      - name: Run clippy
        run: cargo clippy --all --all-features -- -D warnings

  # ─── Formatting ───────────────────────────────────────────────────────────

  fmt:
    name: Format
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.rust == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + rustfmt
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ─── WASM build ───────────────────────────────────────────────────────────

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.wasm == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM package
        run: wasm-pack build crates/wasm --target web --out-dir ../../site/public/pkg --no-typescript

  # ─── Site build ───────────────────────────────────────────────────────────

  site-build:
    name: Site Build
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.site == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM package
        run: wasm-pack build crates/wasm --target web --out-dir ../../site/public/pkg --no-typescript

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: npm ci
        working-directory: site

      - name: Build site
        run: npm run build
        working-directory: site

  # ─── Wrapper verification ──────────────────────────────────────────────

  wrapper-verification:
    name: Wrapper Verification
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.wrappers == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@ad397744b0d591a723ab90405b7247fac0e6b8db # v2

      - name: Syntax-check npm wrapper
        run: node --check packages/kronroe-mcp/bin/kronroe-mcp.js

      - name: Syntax-check Python wrapper
        run: python3 -c "import ast, sys; ast.parse(open(sys.argv[1]).read())" python/kronroe-mcp/src/kronroe_mcp/cli.py

      - name: Build MCP binary (hybrid)
        run: cargo build -p kronroe-mcp --features hybrid

      - name: Prepare wrapper smoke logs
        run: mkdir -p wrapper-smoke-logs

      - name: Hybrid smoke via npm wrapper
        run: python3 scripts/wrapper_smoke.py --wrapper npm --binary target/debug/kronroe-mcp --summary-out wrapper-smoke-logs/npm-wrapper-smoke.json 2>&1 | tee wrapper-smoke-logs/npm-wrapper-smoke.log

      - name: Hybrid smoke via Python wrapper
        run: python3 scripts/wrapper_smoke.py --wrapper python --binary target/debug/kronroe-mcp --summary-out wrapper-smoke-logs/python-wrapper-smoke.json 2>&1 | tee wrapper-smoke-logs/python-wrapper-smoke.log

      - name: Stage 3 wrapper gate decision
        run: |
          python3 scripts/hybrid_stage3_gate.py \
            --input wrapper-smoke-logs/npm-wrapper-smoke.json \
            --input wrapper-smoke-logs/python-wrapper-smoke.json \
            --output wrapper-smoke-logs/stage3-wrapper-gate.json \
            --max-duration-ms 5000 \
            2>&1 | tee wrapper-smoke-logs/stage3-wrapper-gate.log

      - name: Upload wrapper smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrapper-smoke-logs
          path: |
            wrapper-smoke-logs/*.log
            wrapper-smoke-logs/*.json
          if-no-files-found: warn
